name = "garoo"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Browser Rendering API binding
browser = { binding = "BROWSER" }

# KV namespace for storing state
kv_namespaces = [
  { binding = "KV", id = "66a7ac6bd06249ffbc707f632eae4f34" }
]

# Cron trigger (every 3 minutes)
[triggers]
crons = ["*/3 * * * *"]

# Observability (Workers Logs)
[observability]
enabled = true
head_sampling_rate = 1
