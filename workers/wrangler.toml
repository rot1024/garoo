name = "garoo"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Browser Rendering API binding (commented out — not currently used).
# Kept for the archived browser-based provider (src/providers/x_browser.ts),
# which may be revived later. The active provider uses twitterapi.io instead.
# browser = { binding = "BROWSER" }

# KV namespace. Now only holds the Dropbox OAuth token (refreshed ~hourly, so a
# handful of writes/day). Poll state (poll_lock, last_message_id) moved to D1 —
# it was written every cron minute and blew past KV's 1000/day free write quota.
kv_namespaces = [
  { binding = "KV", id = "66a7ac6bd06249ffbc707f632eae4f34" }
]

# D1 database for post metadata (pictures table)
[[d1_databases]]
binding = "DB"
database_name = "garoo"
database_id = "fab08063-3c3d-4646-aada-f1ac557477e3"

# R2 bucket for media files (saved alongside Dropbox)
[[r2_buckets]]
binding = "R2"
bucket_name = "garoo"

# Non-secret config. DEBUG="true" exposes the unauthenticated HTTP action
# endpoints (/webhook, /rescan, /import-dropbox); set to "false" (or remove) in
# production to serve only the health check. (No secret named DEBUG exists, so
# this var does not clobber any secret.)
[vars]
DEBUG = "false"

# All config (DROPBOX_*, NOTION_*, DISCORD_*, TWITTERAPI_IO_KEY) is provided via
# `wrangler secret put` — see Env in src/types.ts. No plaintext [vars] here so
# they cannot clobber the secrets on deploy.

# Cron trigger (every minute). Overlapping ticks are guarded by a D1
# single-flight lock in pollDiscord (see stores/state.ts), so a long run won't be
# double-processed. The lock was moved off KV: writing + deleting it every minute
# (1440+1440/day) exceeded KV's 1000/day free write/delete quota.
[triggers]
crons = ["* * * * *"]

# Observability (Workers Logs)
[observability]
enabled = true
head_sampling_rate = 1
